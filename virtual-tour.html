<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recorrido Virtual 360° - CUHE</title>
    <link rel="stylesheet" href="https://cdn.pannellum.org/2.5/pannellum.css"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        #panorama {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Estilos para controles personalizados */
        .tour-title {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 5px;
            z-index: 100;
            font-size: 18px;
            font-weight: bold;
            max-width: 400px;
        }

        .navigation-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #FFD700;
            padding: 15px 20px;
            border-radius: 5px;
            z-index: 100;
            font-size: 14px;
            max-width: 300px;
        }

        .hotspot-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #FFD700;
            padding: 20px 30px;
            border-radius: 8px;
            text-align: center;
            z-index: 50;
            pointer-events: none;
            animation: pulse 2s infinite;
            font-weight: bold;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* Estilos para los hotspots */
        .pnlm-hotspot {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pnlm-hotspot:hover {
            transform: scale(1.2);
        }

        .hotspot-label {
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            white-space: nowrap;
            border: 2px solid #FFD700;
        }

        .btn-return {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-return:hover {
            background: rgba(255, 0, 0, 1);
        }

        /* Indicador de carga */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px 50px;
            border-radius: 10px;
            z-index: 200;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 215, 0, 0.3);
            border-top: 4px solid #FFD700;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="panorama"></div>
    <div class="tour-title" id="sceneTitle">Recorrido Virtual 360° - CUHE</div>
    <div class="navigation-info" id="navInfo">💡 Mira hacia los puntos amarillos para navegar</div>
    <button class="btn-return" onclick="confirmExit()">Salir</button>

    <script src="https://cdn.pannellum.org/2.5/pannellum.js"></script>
    <script>
        // Configuración del recorrido virtual
        const tourConfig = {
            // ESCENA 1: Entrada
            'entrada': {
                title: 'Entrada Principal',
                image: 'imagenes360/entrada.jpg',
                hotspots: [
                    {
                        pitch: -5,
                        yaw: 45,
                        type: 'scene',
                        text: '→ Pasillo',
                        sceneId: 'entrada_pasillo'
                    }
                ]
            },

            // ESCENA 2: Entrada Pasillo
            'entrada_pasillo': {
                title: 'Pasillo de Entrada',
                image: 'imagenes360/entrada pasillo.jpg',
                hotspots: [
                    {
                        pitch: -5,
                        yaw: 0,
                        type: 'scene',
                        text: '← Volver Entrada',
                        sceneId: 'entrada'
                    },
                    {
                        pitch: -5,
                        yaw: 90,
                        type: 'scene',
                        text: '→ Patio Aulas',
                        sceneId: 'patio_aulas'
                    }
                ]
            },

            // ESCENA 3: Patio Aulas (punto de división)
            'patio_aulas': {
                title: 'Patio - Aulas',
                image: 'imagenes360/patio_aulas360.jpg.jpeg',
                hotspots: [
                    {
                        pitch: 10,
                        yaw: 180,
                        type: 'scene',
                        text: '🔙 Volver Pasillo',
                        sceneId: 'entrada_pasillo'
                    },
                    {
                        pitch: -10,
                        yaw: 45,
                        type: 'scene',
                        text: '☕ Cafetería',
                        sceneId: 'patio_cafeteria'
                    },
                    {
                        pitch: -10,
                        yaw: 270,
                        type: 'scene',
                        text: '📚 Aulas',
                        sceneId: 'pasillo_entrada'
                    }
                ]
            },

            // ESCENA 4: Patio Cafetería
            'patio_cafeteria': {
                title: 'Patio - Cafetería',
                image: 'imagenes360/patio_cafeteria.jpeg',
                hotspots: [
                    {
                        pitch: 10,
                        yaw: 0,
                        type: 'scene',
                        text: '← Volver Patio',
                        sceneId: 'patio_aulas'
                    }
                ]
            },

            // ESCENA 5: Pasillo Aulas
            'pasillo_entrada': {
                title: 'Pasillo Aulas',
                image: 'imagenes360/pasillo_entrada.jpg',
                hotspots: [
                    {
                        pitch: 10,
                        yaw: 180,
                        type: 'scene',
                        text: '🔙 Volver Patio',
                        sceneId: 'patio_aulas'
                    },
                    {
                        pitch: -5,
                        yaw: 45,
                        type: 'scene',
                        text: 'Aula 1',
                        sceneId: 'aula1'
                    }
                ]
            },

            // ESCENA 6: Aula 1
            'aula1': {
                title: 'Aula 1',
                image: 'imagenes360/aula_1.jpg',
                hotspots: [
                    {
                        pitch: 10,
                        yaw: 180,
                        type: 'scene',
                        text: '🔙 Volver Pasillo',
                        sceneId: 'pasillo_entrada'
                    },
                    {
                        pitch: 0,
                        yaw: 90,
                        type: 'scene',
                        text: '→ Aula 2',
                        sceneId: 'aula2'
                    },
                    {
                        pitch: 0,
                        yaw: 270,
                        type: 'scene',
                        text: '← Aula 3',
                        sceneId: 'aula3'
                    }
                ]
            },

            // ESCENA 7: Aula 2
            'aula2': {
                title: 'Aula 2',
                image: 'imagenes360/aula_2_2.jpg',
                hotspots: [
                    {
                        pitch: 10,
                        yaw: 180,
                        type: 'scene',
                        text: '← Volver Aula 1',
                        sceneId: 'aula1'
                    }
                ]
            },

            // ESCENA 8: Aula 3
            'aula3': {
                title: 'Aula 3',
                image: 'imagenes360/aula_3.jpg',
                hotspots: [
                    {
                        pitch: 10,
                        yaw: 180,
                        type: 'scene',
                        text: '→ Volver Aula 1',
                        sceneId: 'aula1'
                    }
                ]
            }
        };

        // Inicializar Pannellum
        const viewer = pannellum.viewer('panorama', {
            default: {
                firstScene: 'entrada',
                author: 'CUHE',
                title: 'Recorrido Virtual 360°',
                fallback: '//:0',
                autoLoad: true,
                showControls: true,
                mouseZoom: true,
                showFullscreenCtrl: true,
                compass: true
            },
            scenes: tourConfig
        });

        // Actualizar título cuando cambia la escena
        viewer.on('scenechange', function(sceneId) {
            const scene = tourConfig[sceneId];
            if (scene) {
                document.getElementById('sceneTitle').textContent = scene.title;
            }
        });

        // Personalizar hotspots
        viewer.on('load', function() {
            const hotspots = document.querySelectorAll('.pnlm-hotspot');
            hotspots.forEach(hotspot => {
                // Crear etiqueta personalizada
                const label = document.createElement('div');
                label.className = 'hotspot-label';
                label.textContent = hotspot.getAttribute('data-text');
                hotspot.textContent = '';
                hotspot.appendChild(label);
                
                // Efecto visual
                hotspot.style.width = '50px';
                hotspot.style.height = '50px';
                hotspot.style.background = 'radial-gradient(circle, rgba(255,215,0,0.8), rgba(255,215,0,0.4))';
                hotspot.style.border = '3px solid #FFD700';
                hotspot.style.borderRadius = '50%';
                hotspot.style.display = 'flex';
                hotspot.style.alignItems = 'center';
                hotspot.style.justifyContent = 'center';
                hotspot.style.animation = 'pulse 1.5s infinite';
            });
        });

        // Eventos de navegación
        function navigateToScene(sceneId) {
            viewer.loadScene(sceneId);
            window.scrollTo(0, 0);
        }

        function confirmExit() {
            if (confirm('¿Deseas salir del recorrido virtual?')) {
                window.location.href = 'index.html';
            }
        }

        // Permitir navegación con teclas
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                confirmExit();
            }
        });

        // Inicializar con la primera escena
        viewer.on('ready', function() {
            console.log('Recorrido virtual cargado correctamente');
        });
    </script>
</body>
</html>
